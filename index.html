<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DropSweat — Track your workouts, nutrition, and progress. Coming soon on Android and iOS." />
  <title>DropSweat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F2F5FA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #DDE4EF;
      border-radius: 16px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 32px;
      font-weight: 700;
      color: #4589E3;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 16px;
      color: #4B5E7A;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .divider {
      width: 40px;
      height: 3px;
      background: #EBF3FF;
      border-radius: 2px;
      margin: 0 auto 32px;
    }
    .coming-soon {
      display: inline-block;
      background: #EBF3FF;
      color: #4589E3;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .platforms {
      font-size: 14px;
      color: #8A9BB5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">DropSweat</div>
    <p class="tagline">Track your workouts, nutrition, and progress — all in one place.</p>
    <div class="divider"></div>
    <div class="coming-soon">Coming Soon</div>
    <p class="platforms">Available on Android &amp; iOS</p>
  </div>
</body>
</html>
